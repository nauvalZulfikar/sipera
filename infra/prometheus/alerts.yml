groups:
  - name: sipera-sla
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
          / sum(rate(http_requests_total[5m])) by (service) > 0.01
        for: 5m
        labels:
          severity: page
        annotations:
          summary: 'Error rate >1% di service {{ $labels.service }}'
          description: 'Selama 5 menit terakhir error rate di {{ $labels.service }} = {{ $value | humanizePercentage }}'

      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (service, le)
          ) > 0.5
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: 'P95 latency >500ms di {{ $labels.service }}'

      - alert: DatabaseSlowQuery
        expr: pg_stat_activity_max_tx_duration > 30
        for: 2m
        labels:
          severity: warn
        annotations:
          summary: 'Query > 30s di PostgreSQL'

      - alert: ContainerDown
        expr: up == 0
        for: 1m
        labels:
          severity: page
        annotations:
          summary: 'Service {{ $labels.job }} down'
