name: sipera-rebuild-full

# Single-command all-in-one stack: infra + 8 backend services + 2 frontends.
# Usage:  docker compose -f infra/docker/docker-compose.full.yml up -d
# Access:
#   - Warga FE:    http://localhost:5173
#   - Dinas FE:    http://localhost:5174
#   - API Gateway: http://localhost:5200
#   - Swagger:     http://localhost:4002/docs (identity, after Phase 17 OpenAPI)

x-node-base: &node-base
  image: node:20-slim
  working_dir: /app
  restart: unless-stopped

services:
  # -------- Infrastructure --------
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sipera-rb-postgres
    environment:
      POSTGRES_USER: sipera
      POSTGRES_PASSWORD: sipera_dev_pwd
      POSTGRES_DB: sipera
    ports: ['5532:5432']
    volumes: [sipera_rb_postgres:/var/lib/postgresql/data]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sipera -d sipera']
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sipera-rb-redis
    ports: ['6479:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      retries: 10

  # -------- Backend services --------
  # NOTE: Untuk production gunakan multi-stage build + dist artifact.
  # Compose ini pakai `tsx` via bind-mount untuk dev.
  identity:
    <<: *node-base
    container_name: sipera-rb-identity
    environment:
      DATABASE_URL: postgresql://sipera:sipera_dev_pwd@postgres:5432/sipera
      JWT_SECRET: dev-secret-replace-in-prod
      PORT: 4002
    ports: ['4002:4002']
    volumes:
      - ../..:/app
      - sipera_rb_node_modules:/app/node_modules
    command: sh -c 'npx pnpm install --frozen-lockfile && npx pnpm --filter @sipera/identity start'
    depends_on:
      postgres: { condition: service_healthy }

  master:
    <<: *node-base
    container_name: sipera-rb-master
    environment:
      DATABASE_URL: postgresql://sipera:sipera_dev_pwd@postgres:5432/sipera
      PORT: 4003
    ports: ['4003:4003']
    volumes:
      - ../..:/app
      - sipera_rb_node_modules:/app/node_modules
    command: sh -c 'npx pnpm install --frozen-lockfile && npx pnpm --filter @sipera/master start'
    depends_on:
      postgres: { condition: service_healthy }

  document:
    <<: *node-base
    container_name: sipera-rb-document
    environment:
      PORT: 4006
      STORAGE_ROOT: /storage
    ports: ['4006:4006']
    volumes:
      - ../..:/app
      - sipera_rb_node_modules:/app/node_modules
      - sipera_rb_storage:/storage
    command: sh -c 'npx pnpm install --frozen-lockfile && npx pnpm --filter @sipera/document start'

  notification:
    <<: *node-base
    container_name: sipera-rb-notification
    environment:
      PORT: 4007
    ports: ['4007:4007']
    volumes:
      - ../..:/app
      - sipera_rb_node_modules:/app/node_modules
    command: sh -c 'npx pnpm install --frozen-lockfile && npx pnpm --filter @sipera/notification start'

  spatial:
    <<: *node-base
    container_name: sipera-rb-spatial
    environment:
      PORT: 4008
    ports: ['4008:4008']
    volumes:
      - ../..:/app
      - sipera_rb_node_modules:/app/node_modules
    command: sh -c 'npx pnpm install --frozen-lockfile && npx pnpm --filter @sipera/spatial start'

  permohonan:
    <<: *node-base
    container_name: sipera-rb-permohonan
    environment:
      PORT: 4009
    ports: ['4009:4009']
    volumes:
      - ../..:/app
      - sipera_rb_node_modules:/app/node_modules
    command: sh -c 'npx pnpm install --frozen-lockfile && npx pnpm --filter @sipera/permohonan start'

  reporting:
    <<: *node-base
    container_name: sipera-rb-reporting
    environment:
      PORT: 4012
      PERMOHONAN_URL: http://permohonan:4009
    ports: ['4012:4012']
    volumes:
      - ../..:/app
      - sipera_rb_node_modules:/app/node_modules
    command: sh -c 'npx pnpm install --frozen-lockfile && npx pnpm --filter @sipera/reporting start'
    depends_on: [permohonan]

  admin:
    <<: *node-base
    container_name: sipera-rb-admin
    environment:
      PORT: 4013
      SETTINGS_FILE: /data/settings.json
    ports: ['4013:4013']
    volumes:
      - ../..:/app
      - sipera_rb_node_modules:/app/node_modules
      - sipera_rb_admin_data:/data
    command: sh -c 'npx pnpm install --frozen-lockfile && npx pnpm --filter @sipera/admin start'

  public-api:
    <<: *node-base
    container_name: sipera-rb-public-api
    environment:
      PORT: 4018
      PERMOHONAN_URL: http://permohonan:4009
    ports: ['4018:4018']
    volumes:
      - ../..:/app
      - sipera_rb_node_modules:/app/node_modules
    command: sh -c 'npx pnpm install --frozen-lockfile && npx pnpm --filter @sipera/public-api start'

  # -------- API Gateway --------
  gateway:
    <<: *node-base
    container_name: sipera-rb-gateway
    environment:
      GATEWAY_PORT: 5200
      LEGACY_UPSTREAM_URL: http://identity:4002 # fallback if legacy unavailable
      IDENTITY_UPSTREAM_URL: http://identity:4002
      MASTER_UPSTREAM_URL: http://master:4003
      PERMOHONAN_UPSTREAM_URL: http://permohonan:4009
      SPATIAL_UPSTREAM_URL: http://spatial:4008
      ROUTE_AUTH: 'new'
      ROUTE_USERS: 'new'
      ROUTE_WILAYAH: 'new'
      ROUTE_KBLI: 'new'
      ROUTE_KATEGORI_ZONA: 'new'
      ROUTE_PERMOHONAN: 'new'
      ROUTE_RDTR: 'new'
      ROUTE_RTRW: 'new'
      CORS_ORIGINS: 'http://localhost:5173,http://localhost:5174'
    ports: ['5200:5200']
    volumes:
      - ../..:/app
      - sipera_rb_node_modules:/app/node_modules
    command: sh -c 'npx pnpm install --frozen-lockfile && npx pnpm --filter @sipera/api-gateway start'
    depends_on: [identity, master, permohonan, spatial]

  # -------- Frontends --------
  frontend-warga:
    <<: *node-base
    container_name: sipera-rb-fe-warga
    environment:
      VITE_API_URL: http://localhost:5200
      PORT: 5173
    ports: ['5173:5173']
    volumes:
      - ../..:/app
      - sipera_rb_node_modules:/app/node_modules
    command: sh -c 'npx pnpm install --frozen-lockfile && npx pnpm --filter @sipera/frontend-warga dev --host 0.0.0.0'

  frontend-dinas:
    <<: *node-base
    container_name: sipera-rb-fe-dinas
    environment:
      VITE_API_URL: http://localhost:5200
      PORT: 5174
    ports: ['5174:5173']
    volumes:
      - ../..:/app
      - sipera_rb_node_modules:/app/node_modules
    command: sh -c 'npx pnpm install --frozen-lockfile && npx pnpm --filter @sipera/frontend-dinas dev --host 0.0.0.0'

volumes:
  sipera_rb_postgres:
  sipera_rb_node_modules:
  sipera_rb_storage:
  sipera_rb_admin_data:
