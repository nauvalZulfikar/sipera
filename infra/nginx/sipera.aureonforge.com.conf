# Host nginx vhost untuk sipera.aureonforge.com
# Place at: /etc/nginx/sites-available/sipera.aureonforge.com
# Symlink: ln -s /etc/nginx/sites-available/sipera.aureonforge.com /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx
# SSL: certbot --nginx -d sipera.aureonforge.com -d admin-sipera.aureonforge.com -d api-sipera.aureonforge.com

# --- WARGA (public-facing) ---
server {
    listen 80;
    listen [::]:80;
    server_name sipera.aureonforge.com;

    # Redirect to HTTPS after certbot run
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sipera.aureonforge.com;

    # SSL — certbot auto-fills these after `certbot --nginx -d sipera.aureonforge.com`
    # ssl_certificate /etc/letsencrypt/live/sipera.aureonforge.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sipera.aureonforge.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: SPA same-origin. 'unsafe-inline' style untuk lib yg inject style runtime.
    # Kalau tile peta diambil langsung dr host GeoServer (bukan via /api),
    # tambahkan host tsb ke img-src & connect-src.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    client_max_body_size 50M; # file upload limit

    # API gateway
    location /api/ {
        proxy_pass http://127.0.0.1:5200/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:4007/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Frontend (warga)
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- DINAS (admin-facing) ---
server {
    listen 80;
    listen [::]:80;
    server_name admin-sipera.aureonforge.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin-sipera.aureonforge.com;

    # ssl_certificate /etc/letsencrypt/live/sipera.aureonforge.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sipera.aureonforge.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always; # admin tidak boleh embed
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP admin: lebih ketat — frame-ancestors 'none' (tidak boleh di-embed sama sekali).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://127.0.0.1:5200/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:4007/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        proxy_pass http://127.0.0.1:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
